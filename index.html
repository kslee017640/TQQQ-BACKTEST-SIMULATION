<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀀트 백테스터 Pro</title>
    
    <link rel="shortcut icon" href="icon.svg" type="image/svg+xml">
    
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* 원래의 산뜻하고 심플한 디자인으로 되돌렸습니다. */
        :root {
            --primary-color: #4CAF50; 
            --bg-color: #f4f7f6;      
            --card-bg: #ffffff;       
            --text-main: #333333;     
            --text-sub: #777777;      
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; } 
        .input-group { flex: 1; display: flex; flex-direction: column; min-width: 120px; } 
        .input-group label { font-size: 14px; margin-bottom: 5px; color: var(--text-sub); font-weight: bold; } 
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        
        .main-btn { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .main-btn:hover { background-color: #45a049; } 
        
        .quick-btn-group { display: flex; gap: 5px; margin-top: 5px; }
        .quick-btn { flex: 1; padding: 8px 0; background-color: #e0e0e0; color: #333; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .quick-btn:hover { background-color: #d0d0d0; }

        #resultArea { display: none; } 
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; } 
        .result-item:last-child { border-bottom: none; } 
        .result-value { font-weight: bold; color: var(--primary-color); } 
        
        #chartArea { width: 100%; height: 500px; margin-top: 20px; border-radius: 8px; overflow: hidden; background-color: #1e1e1e; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 퀀트 백테스터</h1>
        <p style="color:var(--text-sub); font-size:14px;">EMA & 볼린저 밴드 전략</p>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label for="ticker">투자 종목</label>
                <select id="ticker" onchange="updateDefaultDates()">
                    <option value="TQQQ">TQQQ</option>
                    <option value="SOXL">SOXL</option>
                    <option value="AAPL">AAPL</option>
                    <option value="TSLA">TSLA</option>
                    <option value="BTC">BTC</option>
                </select>
            </div>
            <div class="input-group">
                <label for="n_days">기준일 (N일 EMA)</label>
                <input type="number" id="n_days" value="20" min="5">
            </div>
            <div class="input-group">
                <label for="sigma">표준편차 (SIGMA)</label>
                <input type="number" id="sigma" value="1.5" step="0.1" min="0.1">
            </div>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label for="start_date">시작 날짜</label>
                <input type="date" id="start_date">
            </div>
            <div class="input-group">
                <label for="end_date">종료 날짜</label>
                <input type="date" id="end_date">
            </div>
        </div>

        <div class="input-row" style="margin-bottom: 20px;">
            <div class="input-group">
                <label>빠른 기간 선택</label>
                <div class="quick-btn-group">
                    <button type="button" class="quick-btn" onclick="setQuickDate(1)">1년</button>
                    <button type="button" class="quick-btn" onclick="setQuickDate(2)">2년</button>
                    <button type="button" class="quick-btn" onclick="setQuickDate(3)">3년</button>
                    <button type="button" class="quick-btn" onclick="setQuickDate(5)">5년</button>
                    <button type="button" class="quick-btn" onclick="setQuickDate('all')">전체</button>
                </div>
            </div>
        </div>

        <button class="main-btn" onclick="runBacktest()">백테스트 실행하기</button>
    </div>

    <div id="resultArea" class="card">
        <h2 style="margin-top:0; font-size: 18px;">📊 시뮬레이션 결과</h2>
        
        <div class="result-item"><span>총 투자 금액</span><span id="resInvested" class="result-value">$0.00</span></div>
        <div class="result-item"><span>최종 평가 금액</span><span id="resValue" class="result-value">$0.00</span></div>
        <div class="result-item"><span>보유 주식 수</span><span id="resShares" class="result-value">0 주</span></div>
        <div class="result-item"><span>수익률</span><span id="resYield" class="result-value" style="font-size: 18px;">0.00%</span></div>
        
        <div id="chartArea"></div>
    </div>
</div>

<script>
const csvUrls = {
    'TQQQ': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSoyyuFOLcCVVcphupWEJnltG9RgqDHSz1wpNE6Ga2yf95KTcSO4bHH0l4MHInMglSVvIxqFpS3iKbc/pub?output=csv', 
    'SOXL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgwCHgJ6jBPcpe_oE0e1cifk-psBZtAtGW6r4fxyEDm7wDtJ1nFhMrN2TjC9nb7bfjIYOFEkoeSE-/pub?output=csv',
    'AAPL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQHZ3qHqu3e1_nVhc5pnSh68o2IIq3OmVH7McJgK8yBk7E8HvVhJ69IWvRKhyGbrqVwTeJJpQ9wifK/pub?output=csv',
    'TSLA': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRroN1pjeuZtmup187y9YOgaVyDN1OtnJ5SUFKVxnnBjw2A4NaiYD-hkfvM0xkkPGZl525cMUAYPkxm/pub?output=csv',
    'BTC': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYLvNYyPsN6KlvY-HBdm5NE4sRDoK_OW7qyxvYWfAbPbk35O2JS2eHIETTXoMQolWxNUmhmKSK_uej/pub?output=csv'
};

function updateDefaultDates() {
    const ticker = document.getElementById('ticker').value;
    const today = new Date().toISOString().split('T')[0]; 
    let startYear = "2011";
    if (ticker === "BTC") startYear = "2016";
    document.getElementById('start_date').value = `${startYear}-01-01`;
    document.getElementById('end_date').value = today;
}

window.onload = function() { 
    updateDefaultDates(); 
};

function setQuickDate(years) {
    let endDateInput = document.getElementById('end_date');
    if (!endDateInput.value) endDateInput.value = new Date().toISOString().split('T')[0];
    if (years === 'all') {
        const ticker = document.getElementById('ticker').value;
        document.getElementById('start_date').value = (ticker === 'BTC' ? "2016" : "2011") + "-01-01";
        return;
    }
    let end = new Date(endDateInput.value);
    end.setFullYear(end.getFullYear() - years);
    document.getElementById('start_date').value = end.toISOString().split('T')[0];
}

// 💡 원래의 가장 안정적인 PapaParse 데이터 다운로드 방식으로 복구
function fetchAndParseData(ticker, startDate, endDate) {
    const url = csvUrls[ticker];
    return new Promise((resolve, reject) => {
        Papa.parse(url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                try {
                    let parsedData = []; 
                    let start = new Date(startDate); 
                    let end = new Date(endDate);     

                    results.data.forEach(row => {
                        let rowValues = Object.values(row);
                        let rawDate = String(row['날짜'] || row['Date'] || row['date'] || rowValues[0]).trim();
                        if (!rawDate) return; 
                        
                        // 날짜 띄어쓰기 정제 로직 (데이터 누락 방지)
                        let cleanDateStr = rawDate.split(' ')[0].replace(/\s+/g, '');
                        let dateMatch = rawDate.match(/(\d{4})[\-\.\/]\s*(\d{1,2})[\-\.\/]\s*(\d{1,2})/);
                        if (dateMatch) {
                            cleanDateStr = `${dateMatch[1]}-${dateMatch[2].padStart(2, '0')}-${dateMatch[3].padStart(2, '0')}`;
                        }
                        
                        let rowDate = new Date(cleanDateStr);

                        if (rowDate >= start && rowDate <= end) {
                            let open = parseFloat(String(row['시가'] || row['Open'] || rowValues[1] || 0).replace(/,/g, ''));
                            let high = parseFloat(String(row['고가'] || row['High'] || rowValues[2] || 0).replace(/,/g, ''));
                            let low = parseFloat(String(row['저가'] || row['Low'] || rowValues[3] || 0).replace(/,/g, ''));
                            let close = parseFloat(String(row['종가'] || row['Close'] || rowValues[4] || 0).replace(/,/g, ''));

                            if (!isNaN(close) && close > 0) {
                                parsedData.push({ time: cleanDateStr, open: open, high: high, low: low, close: close });
                            }
                        }
                    });
                    
                    parsedData.sort((a, b) => new Date(a.time) - new Date(b.time));
                    resolve(parsedData); 
                } catch (err) { reject(err.message); }
            },
            error: function(err) { reject("구글 시트 데이터를 가져오지 못했습니다."); }
        });
    });
}

function calculateEMA(prices, n) {
    let k = 2 / (n + 1); 
    let emaArray = [prices[0]]; 
    for (let i = 1; i < prices.length; i++) {
        emaArray.push((prices[i] * k) + (emaArray[i - 1] * (1 - k)));
    }
    return emaArray;
}

function calculateStdDev(prices, currentIndex, n) {
    if (currentIndex < n - 1) return 0; 
    let slice = prices.slice(currentIndex - n + 1, currentIndex + 1);
    let mean = slice.reduce((a, b) => a + b) / n;
    let variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n;
    return Math.sqrt(variance);
}

let chartInstance = null;

async function runBacktest() {
    const btn = document.querySelector('.main-btn');
    btn.innerText = "데이터 로딩 중...";
    
    try {
        const ticker = document.getElementById('ticker').value; 
        const N = parseInt(document.getElementById('n_days').value); 
        const SIGMA = parseFloat(document.getElementById('sigma').value); 
        const startDate = document.getElementById('start_date').value; 
        const endDate = document.getElementById('end_date').value; 

        const rawData = await fetchAndParseData(ticker, startDate, endDate);
        
        if (rawData.length === 0) { 
            alert("선택하신 기간의 데이터가 없습니다."); 
            btn.innerText = "백테스트 실행하기"; 
            return; 
        }

        btn.innerText = "시뮬레이션 중...";
        
        const closePrices = rawData.map(d => d.close); 
        const emaValues = calculateEMA(closePrices, N); 

        let totalInvested = 0, cash = 0, shares = 0;
        let lineEma = [], lineUp1 = [], lineDn1 = [], lineUp2 = [], lineDn2 = [];
        let tradeMarkers = [];

        for (let i = 0; i < rawData.length; i++) {
            let currentPrice = closePrices[i]; 
            let currentEMA = emaValues[i];     
            let currentStdDev = calculateStdDev(closePrices, i, N); 
            let currentDate = rawData[i].time; 
            
            if(i >= N) {
                lineEma.push({ time: currentDate, value: currentEMA });
                lineUp1.push({ time: currentDate, value: currentEMA + (1 * SIGMA * currentStdDev) });
                lineDn1.push({ time: currentDate, value: currentEMA - (1 * SIGMA * currentStdDev) });
                lineUp2.push({ time: currentDate, value: currentEMA + (2 * SIGMA * currentStdDev) });
                lineDn2.push({ time: currentDate, value: currentEMA - (2 * SIGMA * currentStdDev) });
            }

            if(i < N) continue;

            let buyShares = 0, sellShares = 0; 
            
            if (currentPrice < currentEMA - (2 * SIGMA * currentStdDev)) buyShares = 3; 
            else if (currentPrice < currentEMA - (1 * SIGMA * currentStdDev)) buyShares = 2; 
            else if (currentPrice < currentEMA) buyShares = 1; 
            else if (currentPrice > currentEMA + (2 * SIGMA * currentStdDev)) sellShares = 2; 
            else if (currentPrice > currentEMA + (1 * SIGMA * currentStdDev)) sellShares = 1; 

            if (buyShares > 0) {
                let cost = buyShares * currentPrice; 
                if (cash >= cost) cash -= cost; 
                else { totalInvested += (cost - cash); cash = 0; } 
                shares += buyShares; 
                
                tradeMarkers.push({ time: currentDate, position: 'belowBar', color: '#e74c3c', shape: 'arrowUp', text: `매수` });
            }
            if (sellShares > 0 && shares > 0) {
                let actualSell = Math.min(shares, sellShares);
                shares -= actualSell; cash += actualSell * currentPrice; 
                
                tradeMarkers.push({ time: currentDate, position: 'aboveBar', color: '#3498db', shape: 'arrowDown', text: `매도` });
            }
        }

        let finalValue = (shares * closePrices[closePrices.length-1]) + cash; 
        let yieldPercent = totalInvested > 0 ? ((finalValue - totalInvested) / totalInvested) * 100 : 0; 

        document.getElementById('resInvested').innerText = "$" + totalInvested.toFixed(2);
        document.getElementById('resValue').innerText = "$" + finalValue.toFixed(2);
        document.getElementById('resShares').innerText = shares + " 주";
        
        let yieldStr = (yieldPercent > 0 ? "+" : "") + yieldPercent.toFixed(2) + "%";
        let yieldEl = document.getElementById('resYield');
        yieldEl.innerText = yieldStr;
        yieldEl.style.color = yieldPercent >= 0 ? "#ff4d4d" : "#3498db"; 
        
        document.getElementById('resultArea').style.display = 'block';

        // 💡 오직 TradingView 차트 그리는 로직만 실행
        const chartContainer = document.getElementById('chartArea');
        if (chartInstance) {
            chartContainer.innerHTML = '';
            chartInstance = null;
        }

        chartInstance = LightweightCharts.createChart(chartContainer, {
            layout: { background: { type: 'solid', color: '#1e1e1e' }, textColor: '#d1d4dc' },
            grid: { vertLines: { color: '#333' }, horzLines: { color: '#333' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            timeScale: { borderColor: '#555', timeVisible: false }
        });

        const candleSeries = chartInstance.addCandlestickSeries({ 
            upColor: '#ef5350', downColor: '#26a69a', borderVisible: false, wickUpColor: '#ef5350', wickDownColor: '#26a69a'
        });
        candleSeries.setData(rawData); 

        const emaSeries = chartInstance.addLineSeries({ color: '#f1c40f', lineWidth: 2, title: 'EMA' });
        emaSeries.setData(lineEma);

        const up1Series = chartInstance.addLineSeries({ color: 'rgba(150, 150, 150, 0.8)', lineWidth: 1, lineStyle: 2, title: '+1σ' });
        up1Series.setData(lineUp1);
        const dn1Series = chartInstance.addLineSeries({ color: 'rgba(150, 150, 150, 0.8)', lineWidth: 1, lineStyle: 2, title: '-1σ' });
        dn1Series.setData(lineDn1);
        const up2Series = chartInstance.addLineSeries({ color: 'rgba(200, 200, 200, 0.4)', lineWidth: 1, lineStyle: 2, title: '+2σ' });
        up2Series.setData(lineUp2);
        const dn2Series = chartInstance.addLineSeries({ color: 'rgba(200, 200, 200, 0.4)', lineWidth: 1, lineStyle: 2, title: '-2σ' });
        dn2Series.setData(lineDn2);

        if (tradeMarkers.length > 0) candleSeries.setMarkers(tradeMarkers);

        chartInstance.timeScale().fitContent();
        
        btn.innerText = "백테스트 실행하기";

    } catch (err) { 
        alert(err);
        btn.innerText = "백테스트 실행하기"; 
    }
}

window.addEventListener('resize', () => {
    if (chartInstance) chartInstance.resize(document.getElementById('chartArea').clientWidth, 500);
});
</script>

</body>
</html>
