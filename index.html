<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀀트 백테스터 Pro</title>
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* 자주 쓰는 색깔들을 미리 이름표(변수)를 붙여서 정해둡니다 */
        :root {
            --primary-color: #4CAF50; /* 버튼에 쓸 예쁜 초록색 */
            --bg-color: #f4f7f6;      /* 전체 배경으로 쓸 연한 회색 */
            --card-bg: #ffffff;       /* 하얀색 네모 상자 색깔 */
            --text-main: #333333;     /* 글씨를 쓸 진한 회색 (완전 검은색보다 눈이 편해요) */
            --text-sub: #777777;      /* 보조 설명에 쓸 연한 회색 */
        }
        
        /* 웹페이지의 가장 바탕이 되는 몸통(body) 설정이에요 */
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; /* 글씨체를 깔끔한 걸로 바꿔줘요 */
            background-color: var(--bg-color); /* 배경색을 아까 정한 연한 회색으로 칠해요 */
            color: var(--text-main); /* 글씨 색깔을 진한 회색으로 칠해요 */
            margin: 0; /* 바깥 여백을 없애요 */
            padding: 20px; /* 안쪽 여백을 줘서 내용이 벽에 붙지 않게 해요 */
        }
        
        /* 내용이 너무 넓게 퍼지지 않게 가운데로 모아주는 상자예요 */
        .container { 
            max-width: 800px; /* 최대 넓이를 800픽셀로 막아둬요 */
            margin: 0 auto;   /* 왼쪽 오른쪽 여백을 똑같이 줘서 가운데로 오게 해요 */
        }
        
        /* 맨 위에 있는 제목을 꾸며줘요 */
        .header { text-align: center; margin-bottom: 20px; } /* 글씨를 가운데로 모으고 아래쪽에 틈을 줘요 */
        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; } /* 제일 큰 제목을 초록색으로 칠해요 */
        
        /* 입력하는 곳과 결과가 나오는 곳을 감싸는 하얀색 카드를 만들어요 */
        .card { 
            background-color: var(--card-bg); /* 카드를 하얀색으로 칠해요 */
            border-radius: 12px; /* 모서리를 둥글게 깎아줘요 (12만큼) */
            padding: 20px; /* 카드 안쪽에 여백을 줘서 글씨가 덜 답답하게 해요 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* 카드 아래에 살짝 그림자를 넣어서 입체적으로 보여요 */
            margin-bottom: 20px; /* 카드 아래쪽에 틈을 줘요 */
        }
        
        /* 입력칸들을 가로로 나란히 놓기 위한 줄이에요 */
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; } 
        
        /* 입력칸 하나하나를 세로로 예쁘게 묶어주는 상자예요 */
        .input-group { flex: 1; display: flex; flex-direction: column; } 
        .input-group label { font-size: 14px; margin-bottom: 5px; color: var(--text-sub); } /* 입력칸 위에 있는 작은 글씨 설명이에요 */
        
        /* 선택하는 상자(select)와 글씨 쓰는 상자(input)를 예쁘게 만들어요 */
        select, input { 
            padding: 12px; /* 안쪽 공간을 넉넉하게 줘서 누르기 편하게 해요 */
            border: 1px solid #ddd; /* 테두리를 연한 회색으로 칠해요 */
            border-radius: 8px; /* 모서리를 살짝 둥글게 깎아줘요 */
            font-size: 14px; /* 글씨 크기예요 */
            outline: none; /* 클릭했을 때 생기는 못생긴 기본 테두리를 없애요 */
            width: 100%; /* 상자 넓이를 카드에 꽉 차게 늘려요 */
            box-sizing: border-box; /* 넓이 계산을 삐져나가지 않게 똑똑하게 해요 */
        }
        
        /* 계산을 시작하는 마법의 버튼을 꾸며요 */
        button { 
            width: 100%; /* 버튼 넓이를 꽉 차게 해요 */
            padding: 15px; /* 버튼을 통통하게 만들어요 */
            background-color: var(--primary-color); /* 버튼을 초록색으로 칠해요 */
            color: white; /* 버튼 안의 글씨는 하얀색으로 해요 */
            border: none; /* 못생긴 기본 테두리를 없애요 */
            border-radius: 8px; /* 모서리를 둥글게 해요 */
            font-size: 16px; font-weight: bold; /* 글씨를 크고 뚱뚱하게(굵게) 만들어요 */
            cursor: pointer; /* 마우스를 올리면 손가락 모양으로 변하게 해요 */
            transition: background-color 0.3s; /* 색깔이 변할 때 0.3초 동안 부드럽게 변하게 해요 */
        }
        /* 버튼 위에 마우스를 올렸을 때 살짝 더 진한 초록색으로 변하게 해요 */
        button:hover { background-color: #45a049; } 
        
        /* 처음에 결과 화면은 숨겨둬요. 계산이 끝나면 짠! 하고 보여줄 거예요 */
        #resultArea { display: none; } 
        
        /* 결과표의 한 줄 한 줄을 꾸며요 */
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; } /* 양끝으로 떨어뜨려 놓고 밑줄을 그어요 */
        .result-item:last-child { border-bottom: none; } /* 맨 마지막 줄은 밑줄을 안 그어요 */
        .result-value { font-weight: bold; color: var(--primary-color); } /* 결과 숫자를 굵은 초록색으로 눈에 띄게 해요 */
        
        /* 차트(그래프)가 그려질 큰 도화지 크기를 정해요 */
        #chartArea { width: 100%; height: 500px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header">
        <h1>📈 퀀트 백테스터</h1>
        <p style="color:var(--text-sub); font-size:14px;">EMA & 볼린저 밴드 전략 + 실전 데이터</p>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label for="ticker">투자 종목</label>
                <select id="ticker" onchange="updateDefaultDates()">
                    <option value="TQQQ">TQQQ</option>
                    <option value="SOXL">SOXL</option>
                    <option value="AAPL">AAPL</option>
                    <option value="TSLA">TSLA</option>
                    <option value="BTC">BTC</option>
                </select>
            </div>
            <div class="input-group">
                <label for="n_days">기준일 (N일 EMA)</label>
                <input type="number" id="n_days" value="120" min="10">
            </div>
            <div class="input-group">
                <label for="sigma">표준편차 (SIGMA)</label>
                <input type="number" id="sigma" value="1.5" step="0.1" min="0.1">
            </div>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label for="start_date">시작 날짜</label>
                <input type="date" id="start_date">
            </div>
            <div class="input-group">
                <label for="end_date">종료 날짜</label>
                <input type="date" id="end_date">
            </div>
        </div>

        <button onclick="runBacktest()">백테스트 실행하기</button>
    </div>

    <div id="resultArea" class="card">
        <h2 style="margin-top:0; font-size: 18px;">📊 시뮬레이션 결과</h2>
        
        <div class="result-item">
            <span>총 투자 금액</span>
            <span id="resInvested" class="result-value">$0.00</span>
        </div>
        
        <div class="result-item">
            <span>최종 평가 금액</span>
            <span id="resValue" class="result-value">$0.00</span>
        </div>
        
        <div class="result-item">
            <span>보유 주식 수</span>
            <span id="resShares" class="result-value">0 주</span>
        </div>
        
        <div class="result-item">
            <span>수익률</span>
            <span id="resYield" class="result-value" style="color: #FF5722;">0.00%</span>
        </div>
        
        <div id="chartArea"></div>
    </div>
</div>

<script>
// 1. 구글 창고(드라이브)에 저장해 둔 주식 데이터(CSV) 주소들이에요.
// 각각의 주식 이름표에 주소를 잘 연결해 뒀어요.
const csvUrls = {
    'TQQQ': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSiVvWAVP3aau5cNGTcIvuOsVU1cOvbc33VbNQFzRA65EJdFrUBme27BTIqTs7YYHxblIOnh3QkAqMc/pub?output=csv', 
    'SOXL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgwCHgJ6jBPcpe_oE0e1cifk-psBZtAtGW6r4fxyEDm7wDtJ1nFhMrN2TjC9nb7bfjIYOFEkoeSE-/pub?output=csv',
    'AAPL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQHZ3qHqu3e1_nVhc5pnSh68o2IIq3OmVH7McJgK8yBk7E8HvVhJ69IWvRKhyGbrqVwTeJJpQ9wifK/pub?output=csv',
    'TSLA': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRroN1pjeuZtmup187y9YOgaVyDN1OtnJ5SUFKVxnnBjw2A4NaiYD-hkfvM0xkkPGZl525cMUAYPkxm/pub?output=csv',
    'BTC': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYLvNYyPsN6KlvY-HBdm5NE4sRDoK_OW7qyxvYWfAbPbk35O2JS2eHIETTXoMQolWxNUmhmKSK_uej/pub?output=csv'
};

// 2. 종목을 바꿀 때마다 시작 날짜를 알아서 맞춰주는 요정이에요.
function updateDefaultDates() {
    // 지금 화면에서 선택된 주식 이름을 가져와요. (예: 'TQQQ')
    const ticker = document.getElementById('ticker').value;
    // 오늘 날짜를 컴퓨터한테 물어봐서 가져와요.
    const today = new Date().toISOString().split('T')[0]; 
    
    // 기본 시작 연도는 2011년으로 정해요.
    let startYear = "2011";
    // 하지만 만약 비트코인(BTC)을 골랐다면 2016년으로 바꿔줘요. (비트코인은 이때부터 데이터가 있으니까요)
    if (ticker === "BTC") startYear = "2016";
    
    // 시작 날짜와 종료 날짜 칸에 요정이가 정한 날짜를 글씨로 적어줘요.
    document.getElementById('start_date').value = `${startYear}-01-01`;
    document.getElementById('end_date').value = today;
}
// 웹사이트가 처음 열리자마자 요정이를 한 번 불러서 날짜를 세팅해요.
updateDefaultDates();

// 3. 인터넷 구글 창고에서 주식 엑셀 데이터를 가져와서 우리 프로그램이 읽을 수 있게 바꿔주는 로봇이에요.
// async는 "로봇이 데이터 가져올 때까지 잠깐만 기다려줘!"라는 뜻이에요.
async function fetchAndParseData(ticker, startDate, endDate) {
    // 우리가 고른 주식의 인터넷 주소를 꺼내와요.
    const url = csvUrls[ticker];
    
    // 데이터를 다 가져올 때까지 약속(Promise)하고 기다리는 거에요.
    return new Promise((resolve, reject) => {
        // Papa라는 이름의 똑똑한 로봇이 인터넷 주소(url)로 가서 데이터를 읽기 시작해요.
        Papa.parse(url, {
            download: true, // 인터넷에서 파일을 다운로드해서 읽어!
            header: true,   // 엑셀 첫 줄은 '날짜, 시가, 종가' 같은 제목이니까 제목으로 생각해!
            skipEmptyLines: true, // 빈 줄이 있으면 그냥 건너뛰어!
            
            // 데이터를 전부 다 성공적으로 읽었을 때 실행되는 부분이에요.
            complete: function(results) {
                let parsedData = []; // 잘 정리된 데이터를 담을 깨끗한 바구니를 준비해요.
                let start = new Date(startDate); // 사용자가 고른 시작 날짜
                let end = new Date(endDate);     // 사용자가 고른 종료 날짜

                // 엑셀의 한 줄 한 줄(row)마다 반복해서 읽어볼게요.
                results.data.forEach(row => {
                    // 날짜가 적혀있는 칸을 찾아요. 한국어 '날짜'일 수도 있고 영어 'Date'일 수도 있어요.
                    let rawDate = row['날짜'] || row['Date'] || row['date'];
                    // 만약 날짜가 안 적혀있으면 이 줄은 그냥 버려요.
                    if (!rawDate) return; 
                    
                    // 날짜 사이에 "2026- 05- 08" 처럼 띄어쓰기가 숨어있으면 컴퓨터가 헷갈려하니까 띄어쓰기를 싹 다 지워줘요.
                    let cleanDateStr = rawDate.replace(/\s+/g, '');
                    // 글씨로 된 날짜를 컴퓨터가 계산할 수 있는 '진짜 날짜 시간'으로 바꿔요.
                    let rowDate = new Date(cleanDateStr);

                    // 우리가 보고 싶은 기간(시작 날짜와 종료 날짜 사이)에 있는 데이터만 바구니에 담을 거예요.
                    if (rowDate >= start && rowDate <= end) {
                        // 시가, 고가, 저가, 종가를 가져와요. 혹시 "1,000" 처럼 쉼표(,)가 있으면 계산을 못하니까 쉼표를 빼고 숫자(parseFloat)로 바꿔요.
                        let open = parseFloat(String(row['시가'] || row['Open'] || 0).replace(/,/g, ''));
                        let high = parseFloat(String(row['고가'] || row['High'] || 0).replace(/,/g, ''));
                        let low = parseFloat(String(row['저가'] || row['Low'] || 0).replace(/,/g, ''));
                        let close = parseFloat(String(row['종가'] || row['Close'] || 0).replace(/,/g, ''));

                        // 깨끗하게 정리된 하루치 데이터를 바구니(parsedData)에 쏙 집어넣어요.
                        parsedData.push({
                            date: cleanDateStr, // 정리된 날짜
                            open: open, high: high, low: low, close: close // 가격들
                        });
                    }
                });
                
                // 가끔 최신 데이터가 위에 있는 경우가 있어서, 옛날부터 오늘까지 시간 순서대로 차례차례 줄을 세워요(정렬).
                parsedData.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                // 정리가 다 끝났어요! 약속을 지켰으니(resolve) 바구니를 돌려줄게요.
                resolve(parsedData);
            },
            // 만약 인터넷이 끊겼거나 주소가 틀려서 에러가 났을 때 실행돼요.
            error: function(err) {
                alert("데이터 로드 실패! URL 공유 설정이나 인터넷 연결을 확인해주세요."); // 사용자에게 경고창을 띄워요.
                reject(err); // 약속을 못 지켰다고 알려줘요.
            }
        });
    });
}

// 4. 지수이동평균(EMA)을 계산하는 수학 천재 함수예요.
// 단순한 평균이 아니라, 최근에 일어난 가격에 점수를 더 많이 줘서 최근 분위기를 잘 반영해요.
function calculateEMA(prices, n) {
    // k는 최근 가격에 얼마나 가중치를 둘지 정하는 마법의 숫자예요.
    let k = 2 / (n + 1); 
    // 계산 결과를 순서대로 담을 수첩을 준비하고, 첫째 날의 가격을 일단 적어둬요.
    let emaArray = [prices[0]]; 
    
    // 둘째 날부터 마지막 날까지 반복하면서 EMA를 계산해요.
    for (let i = 1; i < prices.length; i++) {
        // (오늘 가격 * 마법숫자) + (어제 EMA * (1 - 마법숫자)) 공식을 써서 오늘 EMA를 구해요.
        let todayEMA = (prices[i] * k) + (emaArray[i - 1] * (1 - k));
        // 구한 값을 수첩에 차례대로 적어둬요.
        emaArray.push(todayEMA);
    }
    // 다 적은 수첩을 돌려줘요.
    return emaArray;
}

// 5. 표준편차를 계산해서 주가가 얼마나 위아래로 널뛰기하는지 재는 자예요. (볼린저 밴드의 핵심!)
function calculateStdDev(prices, currentIndex, n) {
    // 만약 우리가 정한 N일(예: 120일)보다 데이터가 적으면 계산을 못하니까 그냥 0을 돌려줘요.
    if (currentIndex < n - 1) return 0; 
    
    // 오늘을 기준으로 과거 N일 치의 가격만 딱 잘라서 가져와요.
    let slice = prices.slice(currentIndex - n + 1, currentIndex + 1);
    
    // 자른 가격들을 다 더해서 N으로 나눠서 평범한 '평균'을 구해요.
    let mean = slice.reduce((a, b) => a + b) / n;
    
    // 각각의 가격이 평균에서 얼마나 떨어져 있는지(분산)를 구하는 복잡한 수학 공식이에요.
    let variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n;
    
    // 분산에 루트(√)를 씌우면 우리가 원하는 '표준편차'가 나와요.
    return Math.sqrt(variance);
}

// 6. 짠! 가장 중요한 핵심 기능이에요. 이 버튼을 누르면 타임머신을 타고 과거로 가서 투자를 시작해요.
async function runBacktest() {
    // 화면에 있는 파란색 버튼을 찾아서 글씨를 '분석 중...'으로 바꿔줘요. (기다리는 동안 지루하지 않게요)
    const btn = document.querySelector('button');
    btn.innerText = "분석 중...";
    
    // 사용자가 화면에 입력한 값들을 모두 가져와서 변수(이름표)에 저장해요.
    const ticker = document.getElementById('ticker').value; // 주식 이름 (TQQQ 등)
    const N = parseInt(document.getElementById('n_days').value); // EMA 며칠 선인지 (120)
    const SIGMA = parseFloat(document.getElementById('sigma').value); // 볼린저밴드 곱하기 숫자 (1.5)
    const startDate = document.getElementById('start_date').value; // 시작 날짜
    const endDate = document.getElementById('end_date').value; // 종료 날짜

    // 아까 만든 데이터 가져오는 로봇을 시켜서 인터넷에서 데이터를 싹 다 가져와요.
    const rawData = await fetchAndParseData(ticker, startDate, endDate);
    
    // 만약 데이터가 텅 비어있으면 에러니까 여기서 계산을 멈추고 버튼을 원래대로 돌려놔요.
    if (rawData.length === 0) { btn.innerText = "백테스트 실행하기"; return; }

    // 데이터 안에서 매일매일의 장이 끝날 때 가격(종가, close)만 따로 뽑아서 배열(줄서기)을 만들어요.
    const closePrices = rawData.map(d => d.close);
    // 아까 만든 수학 천재에게 부탁해서 종가들을 가지고 EMA 선을 쭉 그려달라고 해요.
    const emaValues = calculateEMA(closePrices, N);

    // 내 계좌를 준비해요. 처음엔 투자한 돈도 0, 가진 현금도 0, 가진 주식도 0이에요.
    let totalInvested = 0; // 내 지갑에서 빼서 진짜로 주식에 넣은 원금
    let cash = 0;          // 주식을 팔아서 생긴 임시 현금
    let shares = 0;        // 내가 모은 주식 개수
    
    // 나중에 차트(그래프)에 "이날 샀어!", "이날 팔았어!" 하고 점을 찍어주려고 날짜와 가격을 기록할 빈 수첩이에요.
    let buyDates = [], buyPrices = [], sellDates = [], sellPrices = [];
    
    // 볼린저 밴드 4개의 선을 그리기 위해 각 점들을 기록할 빈 수첩이에요.
    let upper1Data = [], lower1Data = [], upper2Data = [], lower2Data = [];

    // 데이터 첫날부터 마지막 날까지 하루하루 넘어가면서 (for 반복문) 투자를 해볼 거예요!
    for (let i = 0; i < rawData.length; i++) {
        let currentPrice = closePrices[i]; // 오늘의 주식 가격
        let currentEMA = emaValues[i];     // 오늘의 EMA 기준선 가격
        let currentStdDev = calculateStdDev(closePrices, i, N); // 오늘의 표준편차(얼마나 널뛰기하는지)
        let currentDate = rawData[i].date; // 오늘 날짜
        
        // 차트에 밴드 선을 그리기 위해 매일매일 선의 높이를 계산해서 수첩에 적어요.
        if(i >= N) {
            // N일이 지나면 정보가 충분하니 진짜 밴드 선의 위치를 계산해서 넣어요.
            upper1Data.push(currentEMA + (1 * SIGMA * currentStdDev)); // 위에 1번 선 (+1시그마)
            lower1Data.push(currentEMA - (1 * SIGMA * currentStdDev)); // 아래 1번 선 (-1시그마)
            upper2Data.push(currentEMA + (2 * SIGMA * currentStdDev)); // 위에 2번 선 (+2시그마)
            lower2Data.push(currentEMA - (2 * SIGMA * currentStdDev)); // 아래 2번 선 (-2시그마)
        } else {
            // 아직 N일이 안 지나서 데이터가 부족하면 차트에 선을 못 그리니까 '빈칸(null)'으로 둬요.
            upper1Data.push(null); lower1Data.push(null);
            upper2Data.push(null); lower2Data.push(null);
        }

        // N일 이전에는 EMA 계산이 안 되니까, 아직 투자를 안 하고 다음 날로 넘어(continue)가요.
        if(i < N) continue;

        // 오늘은 몇 주를 사고, 몇 주를 팔 건지 정할 변수예요. 처음엔 0으로 시작해요.
        let buyShares = 0, sellShares = 0;
        
        // --- 🤖 우리의 매매 규칙(전략)대로 로봇이 판단하는 부분이에요 ---
        
        // 1번 규칙: 주가가 제일 아래 선(-2시그마)보다도 떨어졌어! 엄청 싼 거니까 3주를 사자!
        if (currentPrice < currentEMA - (2 * SIGMA * currentStdDev)) { 
            buyShares = 3; 
        }
        // 2번 규칙: 주가가 아래 선(-1시그마)보다 떨어졌어! 싸니까 2주를 사자!
        else if (currentPrice < currentEMA - (1 * SIGMA * currentStdDev)) { 
            buyShares = 2; 
        }
        // 3번 규칙: 주가가 평균선(EMA)보다 낮아! 그래도 싼 편이니까 1주를 사자!
        else if (currentPrice < currentEMA) { 
            buyShares = 1; 
        }
        // 4번 규칙: 와! 주가가 제일 위 선(+2시그마)을 뚫었어! 엄청 비싸니까 2주를 팔아서 돈 벌자!
        else if (currentPrice > currentEMA + (2 * SIGMA * currentStdDev)) { 
            sellShares = 2; 
        }
        // 5번 규칙: 주가가 위 선(+1시그마)을 넘었어! 비싸니까 1주만 팔아볼까?
        else if (currentPrice > currentEMA + (1 * SIGMA * currentStdDev)) { 
            sellShares = 1; 
        }
        // 이 규칙 어디에도 안 맞으면 (예: EMA와 +1시그마 사이) 아무것도 안 하고 '관망(Hold)' 합니다.

        // --- 🛒 진짜로 시장에 가서 주식을 사는 행동을 하는 부분이에요 ---
        if (buyShares > 0) {
            let cost = buyShares * currentPrice; // 살 때 필요한 전체 돈을 계산해요 (개수 * 가격).
            
            // 주식 팔아서 챙겨둔 현금(cash)이 있다면 그 돈부터 먼저 써요.
            if (cash >= cost) {
                cash -= cost; // 현금 지갑에서 돈이 빠져나가요.
            } else {
                // 현금이 모자라면 내 진짜 지갑(totalInvested)에서 돈을 더 꺼내서 채워 넣어요.
                totalInvested += (cost - cash); 
                cash = 0; // 현금은 다 썼으니까 0원이 돼요.
            }
            shares += buyShares; // 내가 가진 주식 개수가 늘어나요.
            
            // 나중에 차트에 예쁜 분홍색 점을 찍어주기 위해 언제 얼마에 샀는지 수첩에 적어둬요.
            buyDates.push(currentDate); 
            buyPrices.push(currentPrice);
        }
        
        // --- 💰 진짜로 주식을 파는 행동을 하는 부분이에요 ---
        if (sellShares > 0 && shares > 0) {
            // 내가 팔고 싶은 개수랑 내가 진짜 가진 개수 중에 더 '작은' 숫자만큼만 팔 수 있어요. (없는 걸 팔 순 없으니까요)
            let actualSell = Math.min(shares, sellShares);
            shares -= actualSell; // 팔았으니까 내 주식 개수가 줄어들어요.
            cash += actualSell * currentPrice; // 판 만큼 현금이 들어와요!
            
            // 나중에 차트에 예쁜 파란색 점을 찍어주기 위해 언제 얼마에 팔았는지 수첩에 적어둬요.
            sellDates.push(currentDate); 
            sellPrices.push(currentPrice);
        }
    }

    // 타임머신 여행이 끝났어요! 마지막 날의 성적표를 계산할 시간이에요.
    let finalPrice = closePrices[closePrices.length - 1]; // 여행 마지막 날의 주식 가격이에요.
    let finalValue = (shares * finalPrice) + cash; // 내가 가진 주식 가치랑 남아있는 현금을 다 더해서 내 전 재산을 계산해요.
    
    // 수익률(%) 계산: 돈을 벌었는지 잃었는지 백분율로 계산하는 공식이에요. (투자한 돈이 없으면 0%)
    let yieldPercent = totalInvested > 0 ? ((finalValue - totalInvested) / totalInvested) * 100 : 0;

    // --- 🖥️ 화면에 계산한 결과물들을 예쁘게 찍어주는 부분이에요 ---
    // toFixed(2)는 소수점 두 번째 자리까지만 깔끔하게 잘라서 보여달라는 뜻이에요.
    document.getElementById('resInvested').innerText = "$" + totalInvested.toFixed(2);
    document.getElementById('resValue').innerText = "$" + finalValue.toFixed(2);
    document.getElementById('resShares').innerText = shares + " 주";
    
    // 수익률에 색깔을 칠해요. 0보다 크면(벌었으면) 빨간색 계열, 아니면 파란색으로 칠해요.
    let yieldEl = document.getElementById('resYield');
    yieldEl.innerText = yieldPercent.toFixed(2) + "%";
    yieldEl.style.color = yieldPercent >= 0 ? "#FF5722" : "#2196F3";
    
    // 숨겨놨던 결과 상자를 짠! 하고 화면에 보여주게 바꿔요 (display='block').
    document.getElementById('resultArea').style.display = 'block';

    // --- 📊 여기서부터는 대망의 예쁜 그래프(차트)를 그리는 부분이에요! ---
    const dates = rawData.map(d => d.date); // 차트 가로축에 쓸 날짜들을 쫙 뽑아와요.
    
    // 1. 실제 주가 움직임을 양초 모양(캔들스틱)으로 그려요.
    const traceCandle = { 
        x: dates, close: closePrices, high: rawData.map(d=>d.high), low: rawData.map(d=>d.low), open: rawData.map(d=>d.open), 
        type: 'candlestick', name: ticker, 
        increasing: {line: {color: '#EF5350'}}, // 오를 때는 빨간색
        decreasing: {line: {color: '#26A69A'}}  // 떨어질 때는 파란색 계열(청록색)으로 칠해요.
    };
    
    // 2. 아까 만든 수학천재 평균선(EMA)을 오렌지색 선으로 그려요.
    const traceEMA = { x: dates, y: emaValues, type: 'scatter', mode: 'lines', name: 'EMA', line: {color: 'orange'} };
    
    // 3. 볼린저 밴드의 안쪽 점선 2개 (+1시그마, -1시그마)를 회색으로 그려요.
    const traceUp1 = { x: dates, y: upper1Data, type: 'scatter', mode: 'lines', name: '+1σ', line: {color: 'gray', dash: 'dot', width: 1} };
    const traceDn1 = { x: dates, y: lower1Data, type: 'scatter', mode: 'lines', name: '-1σ', line: {color: 'gray', dash: 'dot', width: 1} };
    
    // 4. 볼린저 밴드의 바깥쪽 듬성듬성한 점선 2개 (+2시그마, -2시그마)를 연한 회색으로 그려요.
    const traceUp2 = { x: dates, y: upper2Data, type: 'scatter', mode: 'lines', name: '+2σ', line: {color: 'lightgray', dash: 'dash', width: 1} };
    const traceDn2 = { x: dates, y: lower2Data, type: 'scatter', mode: 'lines', name: '-2σ', line: {color: 'lightgray', dash: 'dash', width: 1} };
    
    // 5. 내가 주식을 샀던 날들에 예쁜 분홍색 위쪽 화살표(▲) 점을 콕콕 찍어줘요.
    const traceBuy = { x: buyDates, y: buyPrices, type: 'scatter', mode: 'markers', name: '매수', marker: {color: '#E91E63', size: 8, symbol: 'triangle-up'} };
    
    // 6. 내가 주식을 팔았던 날들에 예쁜 파란색 아래쪽 화살표(▼) 점을 콕콕 찍어줘요.
    const traceSell = { x: sellDates, y: sellPrices, type: 'scatter', mode: 'markers', name: '매도', marker: {color: '#2196F3', size: 8, symbol: 'triangle-down'} };

    // 차트 전체의 배경과 제목 등 레이아웃을 예쁘게 꾸며요.
    const layout = { 
        title: `${ticker} 백테스트 결과`, // 차트 제목
        xaxis: { rangeslider: { visible: false } }, // 모바일 화면이 좁으니까 밑에 달린 돋보기 슬라이더는 숨겨요.
        yaxis: { title: '가격 ($)' }, // 세로축 이름
        margin: { l: 40, r: 20, t: 40, b: 30 }, // 겉에 여백을 조금 줘서 예쁘게 맞춰요.
        showlegend: false // 선 이름표(범례)가 화면을 너무 많이 차지해서 모바일을 위해 꺼둬요.
    };
    
    // 자, 아까 부른 Plotly 도구한테 위에서 준비한 그림 재료들을 몽땅 넘겨주고 화면(chartArea)에 "그려줘!" 하고 명령해요.
    Plotly.newPlot('chartArea', [traceCandle, traceEMA, traceUp1, traceDn1, traceUp2, traceDn2, traceBuy, traceSell], layout, {responsive: true});
    
    // 차트가 다 완성됐으니, '분석 중...'이었던 버튼 글씨를 다시 원래대로 돌려놔요.
    btn.innerText = "백테스트 실행하기";
}
</script>
