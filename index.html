<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀀트 백테스터 Pro v7.9</title>
    
    <link rel="shortcut icon" href="icon.svg" type="image/svg+xml">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { --primary-color: #4CAF50; --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #333333; --text-sub: #777777; --border-color: #dddddd; }
        [data-theme="dark"] { --primary-color: #2E7D32; --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; --text-sub: #aaaaaa; --border-color: #333333; }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; transition: background-color 0.3s, color 0.3s; }
        .container { max-width: 800px; margin: 0 auto; position: relative; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        .version-badge { font-size: 12px; background-color: var(--primary-color); color: white; padding: 2px 6px; border-radius: 4px; vertical-align: super; }
        .theme-toggle { position: absolute; right: 0; top: 0; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border-color); }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; } 
        .input-group { flex: 1; display: flex; flex-direction: column; min-width: 120px; } 
        .input-group label { font-size: 14px; margin-bottom: 5px; color: var(--text-sub); font-weight: bold; } 
        select, input { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; background-color: var(--card-bg); color: var(--text-main); }
        .main-btn { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .quick-btn-group { display: flex; gap: 5px; margin-top: 5px; }
        .quick-btn { flex: 1; padding: 8px 0; background-color: #e0e0e0; color: #333; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }
        #resultArea { display: none; } 
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); } 
        .result-value { font-weight: bold; color: var(--primary-color); } 
        #chartArea { width: 100%; height: 500px; margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        @media (max-width: 600px) { .theme-toggle { position: relative; display: block; width: 100%; margin-top: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 퀀트 백테스터 <span class="version-badge">v7.9</span></h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <div class="card">
        <div class="input-row">
            <div class="input-group"><label for="ticker">투자 종목</label><select id="ticker"><option value="TQQQ">TQQQ</option><option value="SOXL">SOXL</option><option value="AAPL">AAPL</option><option value="TSLA">TSLA</option><option value="BTC">BTC</option></select></div>
            <div class="input-group"><label for="n_days">기준일 (N일 EMA)</label><input type="number" id="n_days" value="120" min="5"></div>
            <div class="input-group"><label for="sigma">표준편차 (SIGMA)</label><input type="number" id="sigma" value="1.5" step="0.1" min="0.1"></div>
        </div>
        <div class="input-row">
            <div class="input-group"><label for="start_date">시작 날짜</label><input type="date" id="start_date"></div>
            <div class="input-group"><label for="end_date">종료 날짜</label><input type="date" id="end_date"></div>
        </div>
        <div class="quick-btn-group" style="margin-bottom: 20px;">
            <button type="button" class="quick-btn" onclick="setQuickDate(1)">1년</button>
            <button type="button" class="quick-btn" onclick="setQuickDate(2)">2년</button>
            <button type="button" class="quick-btn" onclick="setQuickDate(3)">3년</button>
            <button type="button" class="quick-btn" onclick="setQuickDate(5)">5년</button>
            <button type="button" class="quick-btn" onclick="setQuickDate('all')">전체</button>
        </div>
        <button class="main-btn" onclick="runBacktest()">백테스트 실행하기</button>
    </div>
    <div id="resultArea" class="card">
        <h2 style="margin-top:0; font-size: 18px;">📊 시뮬레이션 결과</h2>
        <p id="tradeCountText" style="font-size: 13px; color: var(--text-sub); margin-bottom: 15px;">데이터 분석 결과</p>
        <div class="result-item"><span>총 투자 금액</span><span id="resInvested" class="result-value">$0.00</span></div>
        <div class="result-item"><span>최종 평가 금액</span><span id="resValue" class="result-value">$0.00</span></div>
        <div class="result-item"><span>보유 주식 수</span><span id="resShares" class="result-value">0 주</span></div>
        <div class="result-item"><span>수익률</span><span id="resYield" class="result-value" style="font-size: 18px;">0.00%</span></div>
        <div id="chartArea"></div>
    </div>
</div>

<script>
let chartInstance = null;
function toggleTheme() {
    const htmlTag = document.documentElement;
    const isDark = htmlTag.getAttribute('data-theme') === 'dark';
    htmlTag.setAttribute('data-theme', isDark ? 'light' : 'dark');
    if (chartInstance) updateChartTheme(!isDark);
}
function updateChartTheme(isDark) {
    chartInstance.applyOptions({
        layout: { background: { type: 'solid', color: isDark ? '#1e1e1e' : '#ffffff' }, textColor: isDark ? '#d1d4dc' : '#333' },
        grid: { vertLines: { color: isDark ? '#333' : '#eee' }, horzLines: { color: isDark ? '#333' : '#eee' } }
    });
}
const csvUrls = {
    'TQQQ': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSoyyuFOLcCVVcphupWEJnltG9RgqDHSz1wpNE6Ga2yf95KTcSO4bHH0l4MHInMglSVvIxqFpS3iKbc/pub?output=csv', 
    'SOXL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgwCHgJ6jBPcpe_oE0e1cifk-psBZtAtGW6r4fxyEDm7wDtJ1nFhMrN2TjC9nb7bfjIYOFEkoeSE-/pub?output=csv',
    'AAPL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQHZ3qHqu3e1_nVhc5pnSh68o2IIq3OmVH7McJgK8yBk7E8HvVhJ69IWvRKhyGbrqVwTeJJpQ9wifK/pub?output=csv',
    'TSLA': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRroN1pjeuZtmup187y9YOgaVyDN1OtnJ5SUFKVxnnBjw2A4NaiYD-hkfvM0xkkPGZl525cMUAYPkxm/pub?output=csv',
    'BTC': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYLvNYyPsN6KlvY-HBdm5NE4sRDoK_OW7qyxvYWfAbPbk35O2JS2eHIETTXoMQolWxNUmhmKSK_uej/pub?output=csv'
};
window.onload = function() {
    const today = new Date().toISOString().split('T')[0]; 
    document.getElementById('start_date').value = "2011-01-01";
    document.getElementById('end_date').value = today;
};
function setQuickDate(years) {
    let end = new Date();
    if (years === 'all') document.getElementById('start_date').value = "2011-01-01";
    else { end.setFullYear(end.getFullYear() - years); document.getElementById('start_date').value = end.toISOString().split('T')[0]; }
}

// 💡 [v7.9 핵심 수정] 데이터 누락 방지를 위한 초강력 파싱 엔진
async function fetchAndParseData(ticker, startDate, endDate) {
    const url = csvUrls[ticker] + "&_=" + new Date().getTime();
    try {
        const response = await fetch(url);
        const csvText = await response.text();
        return new Promise((resolve) => {
            Papa.parse(csvText, {
                header: false, // 제목 줄에 관계없이 칸 번호로 찾음
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    if (!data || data.length < 2) { resolve([]); return; }
                    let parsedData = [];
                    let start = new Date(startDate);
                    let end = new Date(endDate);
                    // 데이터 처리
                    for (let i = 1; i < data.length; i++) {
                        let row = data[i];
                        let rawDate = (row[0] || '').trim(); // 첫 번째 칸은 무조건 날짜
                        if (!rawDate) continue;
                        let cleanDateStr = rawDate.replace(/\s+/g, '').replace(/[\.\/]/g, '-');
                        if (cleanDateStr.length < 8) continue;
                        let rowDate = new Date(cleanDateStr);
                        if (rowDate >= start && rowDate <= end) {
                            let close = parseFloat(String(row[1] || 0).replace(/,/g, '')); // 두 번째 칸은 종가
                            if (!isNaN(close) && close > 0) {
                                parsedData.push({ 
                                    time: cleanDateStr.substring(0,10), 
                                    open: parseFloat(String(row[2] || close).replace(/,/g, '')), 
                                    high: parseFloat(String(row[3] || close).replace(/,/g, '')), 
                                    low: parseFloat(String(row[4] || close).replace(/,/g, '')), 
                                    close: close 
                                });
                            }
                        }
                    }
                    parsedData.sort((a, b) => new Date(a.time) - new Date(b.time));
                    resolve(parsedData);
                }
            });
        });
    } catch (e) { alert("데이터 로딩 실패!"); return []; }
}

function calculateEMA(prices, n) {
    let k = 2 / (n + 1);
    let ema = [prices[0]];
    for (let i = 1; i < prices.length; i++) ema.push(prices[i] * k + ema[i - 1] * (1 - k));
    return ema;
}
function calculateStdDev(prices, idx, n) {
    if (idx < n - 1) return 0;
    let slice = prices.slice(idx - n + 1, idx + 1);
    let mean = slice.reduce((a, b) => a + b) / n;
    return Math.sqrt(slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n);
}

async function runBacktest() {
    const btn = document.querySelector('.main-btn');
    btn.innerText = "데이터 분석 중...";
    const ticker = document.getElementById('ticker').value;
    const N = parseInt(document.getElementById('n_days').value);
    const SIGMA = parseFloat(document.getElementById('sigma').value);
    const startDate = document.getElementById('start_date').value;
    const endDate = document.getElementById('end_date').value;

    const rawData = await fetchAndParseData(ticker, startDate, endDate);
    if (rawData.length === 0) { alert("데이터가 없습니다. 날짜를 확인해주세요."); btn.innerText = "백테스트 실행하기"; return; }

    const closePrices = rawData.map(d => d.close);
    const emaValues = calculateEMA(closePrices, N);
    let totalInvested = 0, cash = 0, shares = 0, tradeCount = 0;
    let lineEma = [], lineUp1 = [], lineDn1 = [], lineUp2 = [], lineDn2 = [];
    let tradeMarkers = [];

    for (let i = 0; i < rawData.length; i++) {
        let curPrice = closePrices[i], curEMA = emaValues[i], curSD = calculateStdDev(closePrices, i, N), curDate = rawData[i].time;
        if (i >= N) {
            lineEma.push({ time: curDate, value: curEMA });
            lineUp1.push({ time: curDate, value: curEMA + SIGMA * curSD });
            lineDn1.push({ time: curDate, value: curEMA - SIGMA * curSD });
            lineUp2.push({ time: curDate, value: curEMA + 2 * SIGMA * curSD });
            lineDn2.push({ time: curDate, value: curEMA - 2 * SIGMA * curSD });
            let buy = 0, sell = 0;
            if (curPrice < curEMA - 2 * SIGMA * curSD) buy = 3;
            else if (curPrice < curEMA - SIGMA * curSD) buy = 2;
            else if (curPrice < curEMA) buy = 1;
            else if (curPrice > curEMA + 2 * SIGMA * curSD) sell = 2;
            else if (curPrice > curEMA + SIGMA * curSD) sell = 1;
            if (buy > 0) {
                let cost = buy * curPrice;
                if (cash >= cost) cash -= cost; else { totalInvested += (cost - cash); cash = 0; }
                shares += buy; tradeCount++;
                tradeMarkers.push({ time: curDate, position: 'belowBar', color: '#e74c3c', shape: 'arrowUp', text: '매수' });
            } else if (sell > 0 && shares > 0) {
                let qty = Math.min(shares, sell);
                shares -= qty; cash += qty * curPrice; tradeCount++;
                tradeMarkers.push({ time: curDate, position: 'aboveBar', color: '#3498db', shape: 'arrowDown', text: '매도' });
            }
        }
    }
    let finalValue = (shares * closePrices[closePrices.length - 1]) + cash;
    let yieldPer = totalInvested > 0 ? ((finalValue - totalInvested) / totalInvested) * 100 : 0;
    document.getElementById('tradeCountText').innerText = `총 ${rawData.length}일 데이터 / 거래 ${tradeCount}회`;
    document.getElementById('resInvested').innerText = "$" + totalInvested.toFixed(2);
    document.getElementById('resValue').innerText = "$" + finalValue.toFixed(2);
    document.getElementById('resShares').innerText = shares + " 주";
    document.getElementById('resYield').innerText = (yieldPer > 0 ? "+" : "") + yieldPer.toFixed(2) + "%";
    document.getElementById('resYield').style.color = yieldPer >= 0 ? "#ff4d4d" : "#3498db";
    document.getElementById('resultArea').style.display = 'block';
    const chartContainer = document.getElementById('chartArea');
    chartContainer.innerHTML = '';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    chartInstance = LightweightCharts.createChart(chartContainer, {
        layout: { background: { type: 'solid', color: isDark ? '#1e1e1e' : '#ffffff' }, textColor: isDark ? '#d1d4dc' : '#333' },
        grid: { vertLines: { color: isDark ? '#333' : '#eee' }, horzLines: { color: isDark ? '#333' : '#eee' } },
        timeScale: { borderColor: '#555' }
    });
    const candleSeries = chartInstance.addCandlestickSeries({ upColor: '#ef5350', downColor: '#26a69a' });
    candleSeries.setData(rawData);
    const emaSeries = chartInstance.addLineSeries({ color: '#f1c40f', lineWidth: 2 });
    emaSeries.setData(lineEma);
    const up1 = chartInstance.addLineSeries({ color: 'rgba(150, 150, 150, 0.5)', lineWidth: 1, lineStyle: 2 });
    up1.setData(lineUp1);
    const dn1 = chartInstance.addLineSeries({ color: 'rgba(150, 150, 150, 0.5)', lineWidth: 1, lineStyle: 2 });
    dn1.setData(lineDn1);
    candleSeries.setMarkers(tradeMarkers);
    chartInstance.timeScale().fitContent();
    btn.innerText = "백테스트 실행하기";
}
window.addEventListener('resize', () => { if (chartInstance) chartInstance.resize(document.getElementById('chartArea').clientWidth, 500); });
</script>
</body>
</html>
