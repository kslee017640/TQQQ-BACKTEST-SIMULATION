<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀀트 백테스터 Pro</title>
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #777777;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 14px; margin-bottom: 5px; color: var(--text-sub); }
        select, input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #45a049; }
        #resultArea { display: none; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .result-item:last-child { border-bottom: none; }
        .result-value { font-weight: bold; color: var(--primary-color); }
        #chartArea { width: 100%; height: 500px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📈 퀀트 백테스터</h1>
        <p style="color:var(--text-sub); font-size:14px;">EMA & 볼린저 밴드 전략 + 실제 데이터 연동</p>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="input-group">
                <label for="ticker">투자 종목</label>
                <select id="ticker" onchange="updateDefaultDates()">
                    <option value="TQQQ">TQQQ</option>
                    <option value="SOXL">SOXL</option>
                    <option value="AAPL">AAPL</option>
                    <option value="TSLA">TSLA</option>
                    <option value="BTC">BTC</option>
                </select>
            </div>
            <div class="input-group">
                <label for="n_days">기준일 (N일 EMA)</label>
                <input type="number" id="n_days" value="120" min="10">
            </div>
            <div class="input-group">
                <label for="sigma">표준편차 (SIGMA)</label>
                <input type="number" id="sigma" value="1.5" step="0.1" min="0.1">
            </div>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label for="start_date">시작 날짜</label>
                <input type="date" id="start_date">
            </div>
            <div class="input-group">
                <label for="end_date">종료 날짜</label>
                <input type="date" id="end_date">
            </div>
        </div>

        <button onclick="runBacktest()">백테스트 실행하기</button>
    </div>

    <div id="resultArea" class="card">
        <h2 style="margin-top:0; font-size: 18px;">📊 시뮬레이션 결과</h2>
        <div class="result-item">
            <span>총 투자 금액</span>
            <span id="resInvested" class="result-value">$0.00</span>
        </div>
        <div class="result-item">
            <span>최종 평가 금액</span>
            <span id="resValue" class="result-value">$0.00</span>
        </div>
        <div class="result-item">
            <span>보유 주식 수</span>
            <span id="resShares" class="result-value">0 주</span>
        </div>
        <div class="result-item">
            <span>수익률</span>
            <span id="resYield" class="result-value" style="color: #FF5722;">0.00%</span>
        </div>
        
        <div id="chartArea"></div>
    </div>
</div>

<script>
// =====================================================================
// 🚨🚨🚨 [여기입니다! 구글 스프레드시트 링크 넣는 곳] 🚨🚨🚨
// 아래의 텍스트를 지우고, 구글에서 복사한 링크를 작은따옴표(' ') 사이에 넣어주세요.
// =====================================================================
const csvUrls = {
    'TQQQ': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSiVvWAVP3aau5cNGTcIvuOsVU1cOvbc33VbNQFzRA65EJdFrUBme27BTIqTs7YYHxblIOnh3QkAqMc/pub?output=csv', 
    'SOXL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTfgwCHgJ6jBPcpe_oE0e1cifk-psBZtAtGW6r4fxyEDm7wDtJ1nFhMrN2TjC9nb7bfjIYOFEkoeSE-/pub?output=csv',
    'AAPL': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQHZ3qHqu3e1_nVhc5pnSh68o2IIq3OmVH7McJgK8yBk7E8HvVhJ69IWvRKhyGbrqVwTeJJpQ9wifK/pub?output=csv',
    'TSLA': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRroN1pjeuZtmup187y9YOgaVyDN1OtnJ5SUFKVxnnBjw2A4NaiYD-hkfvM0xkkPGZl525cMUAYPkxm/pub?output=csv',
    'BTC': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYLvNYyPsN6KlvY-HBdm5NE4sRDoK_OW7qyxvYWfAbPbk35O2JS2eHIETTXoMQolWxNUmhmKSK_uej/pub?output=csv'
};
// =====================================================================
// 🚨🚨🚨 [링크 넣는 곳 끝] 🚨🚨🚨
// =====================================================================

// 종목 변경 시 기본 날짜 자동 설정
function updateDefaultDates() {
    const ticker = document.getElementById('ticker').value;
    const today = new Date().toISOString().split('T')[0];
    
    let startYear = "2011";
    if (ticker === "BTC") startYear = "2016";
    
    document.getElementById('start_date').value = `${startYear}-01-01`;
    document.getElementById('end_date').value = today;
}
updateDefaultDates();

// 실제 CSV 데이터를 가져오고 파싱하는 함수
async function fetchAndParseData(ticker, startDate, endDate) {
    const url = csvUrls[ticker];
    
    // 링크가 아직 교체되지 않았을 때의 안내
    if(url.includes('여러분의')) {
        alert(ticker + " 종목의 구글 스프레드시트 링크가 아직 입력되지 않았습니다! 코드의 csvUrls 부분을 수정해주세요.");
        return [];
    }

    return new Promise((resolve, reject) => {
        Papa.parse(url, {
            download: true,
            header: true,      // 첫 줄을 제목으로 인식
            skipEmptyLines: true,
            complete: function(results) {
                let parsedData = [];
                let start = new Date(startDate);
                let end = new Date(endDate);

                // 야후 파이낸스의 Date, Open, High, Low, Close 열을 가져옵니다.
                results.data.forEach(row => {
                    let rowDate = new Date(row.Date);
                    // 사용자가 설정한 기간 안의 데이터만 걸러냅니다.
                    if (rowDate >= start && rowDate <= end) {
                        parsedData.push({
                            date: row.Date,
                            open: parseFloat(row.Open),
                            high: parseFloat(row.High),
                            low: parseFloat(row.Low),
                            close: parseFloat(row.Close)
                        });
                    }
                });
                resolve(parsedData);
            },
            error: function(err) {
                alert("데이터를 가져오는 중 오류가 발생했습니다. 링크를 다시 확인해주세요.");
                reject(err);
            }
        });
    });
}

// EMA(지수이동평균) 계산
function calculateEMA(prices, n) {
    let k = 2 / (n + 1);
    let emaArray = [prices[0]];
    for (let i = 1; i < prices.length; i++) {
        emaArray.push((prices[i] * k) + (emaArray[i - 1] * (1 - k)));
    }
    return emaArray;
}

// 표준편차 계산
function calculateStdDev(prices, currentIndex, n) {
    if (currentIndex < n - 1) return 0;
    let slice = prices.slice(currentIndex - n + 1, currentIndex + 1);
    let mean = slice.reduce((a, b) => a + b) / n;
    let variance = slice.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n;
    return Math.sqrt(variance);
}

// 백테스트 실행
async function runBacktest() {
    const btn = document.querySelector('button');
    btn.innerText = "데이터 불러오는 중...";
    
    const ticker = document.getElementById('ticker').value;
    const N = parseInt(document.getElementById('n_days').value);
    const SIGMA = parseFloat(document.getElementById('sigma').value);
    const startDate = document.getElementById('start_date').value;
    const endDate = document.getElementById('end_date').value;

    // 데이터 가져오기
    const rawData = await fetchAndParseData(ticker, startDate, endDate);
    
    if (rawData.length === 0) {
        btn.innerText = "백테스트 실행하기";
        return; // 에러가 나거나 데이터가 없으면 중단합니다.
    }

    btn.innerText = "계산 중...";

    const closePrices = rawData.map(d => d.close);
    const emaValues = calculateEMA(closePrices, N);

    let totalInvested = 0;
    let cash = 0;
    let shares = 0;

    let buyDates = [], buyPrices = [];
    let sellDates = [], sellPrices = [];
    
    let upper1Data = [], lower1Data = [];
    let upper2Data = [], lower2Data = [];

    // 매매 시뮬레이션
    for (let i = 0; i < rawData.length; i++) {
        let currentPrice = closePrices[i];
        let currentEMA = emaValues[i];
        let currentStdDev = calculateStdDev(closePrices, i, N);
        let currentDate = rawData[i].date;
        
        if(i >= N) {
            upper1Data.push(currentEMA + (1 * SIGMA * currentStdDev));
            lower1Data.push(currentEMA - (1 * SIGMA * currentStdDev));
            upper2Data.push(currentEMA + (2 * SIGMA * currentStdDev));
            lower2Data.push(currentEMA - (2 * SIGMA * currentStdDev));
        } else {
            upper1Data.push(null); lower1Data.push(null);
            upper2Data.push(null); lower2Data.push(null);
        }

        if(i < N) continue;

        let buyShares = 0;
        let sellShares = 0;

        if (currentPrice < currentEMA - (2 * SIGMA * currentStdDev)) { buyShares = 3; } 
        else if (currentPrice < currentEMA - (1 * SIGMA * currentStdDev)) { buyShares = 2; } 
        else if (currentPrice < currentEMA) { buyShares = 1; } 
        else if (currentPrice > currentEMA + (2 * SIGMA * currentStdDev)) { sellShares = 2; } 
        else if (currentPrice > currentEMA + (1 * SIGMA * currentStdDev)) { sellShares = 1; }

        if (buyShares > 0) {
            let cost = buyShares * currentPrice;
            if (cash >= cost) cash -= cost;
            else { totalInvested += (cost - cash); cash = 0; }
            shares += buyShares;
            
            buyDates.push(currentDate);
            buyPrices.push(currentPrice);
        }

        if (sellShares > 0 && shares > 0) {
            let actualSell = Math.min(shares, sellShares);
            shares -= actualSell;
            cash += actualSell * currentPrice;
            
            sellDates.push(currentDate);
            sellPrices.push(currentPrice);
        }
    }

    // 결과 표시
    let finalPrice = closePrices[closePrices.length - 1];
    let finalValue = (shares * finalPrice) + cash;
    let yieldPercent = totalInvested > 0 ? ((finalValue - totalInvested) / totalInvested) * 100 : 0;

    document.getElementById('resInvested').innerText = "$" + totalInvested.toFixed(2);
    document.getElementById('resValue').innerText = "$" + finalValue.toFixed(2);
    document.getElementById('resShares').innerText = shares + " 주";
    
    let yieldEl = document.getElementById('resYield');
    yieldEl.innerText = yieldPercent.toFixed(2) + "%";
    yieldEl.style.color = yieldPercent >= 0 ? "#FF5722" : "#2196F3";

    document.getElementById('resultArea').style.display = 'block';

    // 차트 그리기
    const dates = rawData.map(d => d.date);
    
    const traceCandle = {
        x: dates, close: closePrices, high: rawData.map(d=>d.high), low: rawData.map(d=>d.low), open: rawData.map(d=>d.open),
        type: 'candlestick', name: ticker,
        increasing: {line: {color: '#EF5350'}}, decreasing: {line: {color: '#26A69A'}}
    };
    const traceEMA = { x: dates, y: emaValues, type: 'scatter', mode: 'lines', name: 'EMA', line: {color: 'orange'} };
    const traceUp1 = { x: dates, y: upper1Data, type: 'scatter', mode: 'lines', name: '+1 Sigma', line: {color: 'gray', dash: 'dot', width: 1} };
    const traceDn1 = { x: dates, y: lower1Data, type: 'scatter', mode: 'lines', name: '-1 Sigma', line: {color: 'gray', dash: 'dot', width: 1} };
    const traceUp2 = { x: dates, y: upper2Data, type: 'scatter', mode: 'lines', name: '+2 Sigma', line: {color: 'lightgray', dash: 'dash', width: 1} };
    const traceDn2 = { x: dates, y: lower2Data, type: 'scatter', mode: 'lines', name: '-2 Sigma', line: {color: 'lightgray', dash: 'dash', width: 1} };
    const traceBuy = { x: buyDates, y: buyPrices, type: 'scatter', mode: 'markers', name: '매수', marker: {color: '#E91E63', size: 8, symbol: 'triangle-up'} };
    const traceSell = { x: sellDates, y: sellPrices, type: 'scatter', mode: 'markers', name: '매도', marker: {color: '#2196F3', size: 8, symbol: 'triangle-down'} };

    const layout = {
        title: `${ticker} 백테스트 차트`,
        xaxis: { rangeslider: { visible: false } }, 
        yaxis: { title: '가격 ($)' },
        margin: { l: 40, r: 20, t: 40, b: 30 },
        showlegend: false
    };

    Plotly.newPlot('chartArea', [traceCandle, traceEMA, traceUp1, traceDn1, traceUp2, traceDn2, traceBuy, traceSell], layout, {responsive: true});

    btn.innerText = "백테스트 실행하기";
}
</script>

</body>
</html>
